<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Matchday — Family World Cup 2026 Predictor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --pitch1:#062019; --pitch2:#0a3526; --pitch3:#0c4030;
  --card:#0d3829; --card2:#10422f;
  --line:rgba(238,245,238,.10); --line2:rgba(238,245,238,.18);
  --chalk:#eef5ee; --mute:#8fae9f; --mute2:#6f8f80;
  --gold:#f4c95d; --gold2:#e0a23a; --live:#ff6a45;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --disp:'Oswald',system-ui,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--chalk);
  background:
    radial-gradient(1200px 500px at 50% -10%, #0e4a36 0%, transparent 60%),
    linear-gradient(180deg,var(--pitch1),var(--pitch2) 55%,var(--pitch1));
  background-attachment:fixed;
  min-height:100vh; padding-bottom:84px;
}
/* faint pitch stripes */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.014) 0 64px,transparent 64px 128px);}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:0 14px}

/* ---------- header ---------- */
header{padding:18px 14px 10px;max-width:660px;margin:0 auto;position:relative;z-index:2}
.brand{display:flex;align-items:center;gap:10px}
.ball{font-size:26px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.title{font-family:var(--disp);font-weight:700;letter-spacing:.16em;font-size:21px;text-transform:uppercase;line-height:1}
.title small{display:block;font-size:10.5px;letter-spacing:.34em;color:var(--gold);font-weight:500;margin-top:3px}
.saved{margin-left:auto;font-size:11px;color:var(--mute);display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .4s}
.saved.show{opacity:1}
.saved b{color:var(--gold);font-weight:600}

/* leader ribbon */
.ribbon{display:flex;gap:7px;margin-top:13px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.ribbon::-webkit-scrollbar{display:none}
.lead-pill{flex:0 0 auto;display:flex;align-items:center;gap:7px;background:var(--card);
  border:1px solid var(--line);border-radius:999px;padding:5px 11px 5px 7px}
.lead-pill .dot{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#06140e;font-family:var(--disp)}
.lead-pill .nm{font-size:12.5px;font-weight:600}
.lead-pill .pt{font-family:var(--disp);font-weight:700;font-size:14px}
.lead-pill.king{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold2) inset, 0 4px 16px rgba(244,201,93,.18)}
.crown{font-size:13px}
.livedelta{color:var(--live);font-size:10.5px;font-weight:700;margin-left:1px}

/* ---------- live table ---------- */
.livetable{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.lt-head{display:flex;align-items:baseline;gap:8px;padding:10px 13px;border-bottom:1px solid var(--line)}
.lt-title{font-family:var(--disp);font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:7px}
.lt-sub{font-size:10px;color:var(--mute2);letter-spacing:.04em;margin-left:auto}
.livedot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,106,69,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,106,69,.55)}70%{box-shadow:0 0 0 7px rgba(255,106,69,0)}100%{box-shadow:0 0 0 0 rgba(255,106,69,0)}}
.lt-row{display:grid;grid-template-columns:18px 24px 26px 1fr auto auto;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--line)}
.lt-row:last-child{border-bottom:none}
.lt-row.king{background:rgba(244,201,93,.06)}
.lt-rank{font-family:var(--disp);font-weight:700;color:var(--mute2);text-align:center;font-size:14px}
.lt-row.king .lt-rank{color:var(--gold)}
.mv{font-size:10px;font-weight:700;text-align:center}
.mv.up{color:#34d399}.mv.dn{color:var(--live)}.mv.eq{color:var(--mute2)}
.lt-av{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:11px;font-family:var(--disp)}
.lt-nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lt-stat{font-size:10px;color:var(--mute2);font-family:var(--disp);letter-spacing:.05em;white-space:nowrap}
.lt-pts{font-family:var(--disp);font-weight:700;font-size:19px;text-align:right;display:flex;align-items:baseline;gap:4px;justify-content:flex-end;min-width:30px}
.lt-live{font-size:10px;color:var(--live);font-weight:700}

/* ---------- per-match breakdown ---------- */
.bd{margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
.bd-head{display:flex;align-items:center;justify-content:space-between;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute2);font-weight:600;margin-bottom:7px}
.bd-prov{color:var(--live);font-weight:700}
.bd-row{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:9px;padding:4px 0}
.bd-row.top .bd-pts{color:var(--gold)}
.bd-av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:10px;font-family:var(--disp)}
.bd-mid{min-width:0}
.bd-nm{font-size:12.5px;font-weight:600;display:block}
.bd-dt{font-size:10px;color:var(--mute);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bd-dt.none{color:var(--mute2);font-style:italic}
.bd-pts{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--mute2);min-width:18px;text-align:right}
.bd-pts.pos{color:var(--chalk)}

/* ---------- records ---------- */
.rechero{background:linear-gradient(180deg,rgba(244,201,93,.14),var(--card));border:1px solid var(--gold);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.rh-lbl{font-family:var(--disp);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:11px}
.rh-row{display:flex;align-items:center;gap:13px}
.rh-av{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:20px;font-family:var(--disp);flex:0 0 auto}
.rh-info{flex:1;min-width:0}
.rh-nm{font-size:18px;font-weight:700}
.rh-game{font-size:12px;color:var(--chalk);margin-top:2px}
.rh-date{font-size:10.5px;color:var(--mute2);margin-top:1px}
.rh-ptswrap{text-align:center}
.rh-pts{font-family:var(--disp);font-size:38px;font-weight:700;line-height:1;color:var(--gold)}
.rh-u{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute2)}
.reclist{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.rec-row{display:grid;grid-template-columns:auto 26px 1fr auto;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--line)}
.rec-row:last-child{border-bottom:none}
.rec-row.gold{background:rgba(244,201,93,.07)}
.rec-rk{font-family:var(--disp);font-weight:700;color:var(--mute2);font-size:13px;width:14px;text-align:center}
.rec-row.gold .rec-rk{color:var(--gold)}
.rec-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:11px;font-family:var(--disp)}
.rec-mid{min-width:0}
.rec-nm{font-size:13px;font-weight:600;display:block}
.rec-tag{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold2);border-radius:5px;padding:0 4px;margin-left:4px;vertical-align:middle}
.rec-gm{font-size:10.5px;color:var(--mute);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-pts{font-family:var(--disp);font-weight:700;font-size:19px;text-align:right}
.rec-pts.zero{color:var(--mute2)}

/* ---------- stats tab ---------- */
.leadgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lead-card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:13px;padding:12px;box-shadow:var(--shadow);text-align:center}
.lc-val{font-family:var(--disp);font-size:26px;font-weight:700;color:var(--gold);line-height:1}
.lc-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute2);margin-top:4px;font-weight:600}
.lc-who{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:12.5px;font-weight:600}
.lc-av{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:9px;font-family:var(--disp)}
.stat-card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:10px;box-shadow:var(--shadow)}
.sc-top{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.sc-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:13px;font-family:var(--disp)}
.sc-nm{font-size:15px;font-weight:700;flex:1}
.sc-total{font-family:var(--disp);font-weight:700;font-size:22px}
.sc-total small{font-size:10px;color:var(--mute2);font-weight:600;margin-left:3px;font-family:var(--body);letter-spacing:.04em}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}
.sc-cell{text-align:center;background:#06160f;border:1px solid var(--line);border-radius:9px;padding:7px 3px}
.sc-cell b{display:block;font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:.02em}
.sc-cell span{display:block;font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mute2);margin-top:2px;font-weight:600}

/* ---------- news tab ---------- */
.news-dateline{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:-2px 2px 12px}
.news-card{position:relative;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-left:3px solid var(--accent,var(--gold));border-radius:12px;padding:11px 13px 12px;margin-bottom:10px;box-shadow:var(--shadow)}
.nc-tag{display:inline-block;font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:800;color:#06140e;background:var(--accent,var(--gold));padding:2px 7px;border-radius:5px;margin-bottom:7px}
.nc-title{font-family:var(--disp);font-weight:700;font-size:17px;line-height:1.12;letter-spacing:.01em;margin-bottom:4px}
.nc-sub{font-size:12.5px;color:var(--mute);line-height:1.45}
.nc-up .nc-tag,.nc-star .nc-tag,.nc-hot .nc-tag{filter:saturate(1.1)}
.nc-down{border-left-color:#7a8699}
.nc-cold{border-left-color:#6b7280}
/* ---------- news: fan zone (social) + op-eds ---------- */
.news-section{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
.news-section::after{content:"";flex:1;height:1px;background:var(--line)}
.fanpost{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px 10px;margin-bottom:9px}
.fp-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fp-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(135deg,var(--card2),var(--line));flex:0 0 auto}
.fp-name{font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:4px}
.fp-tick{color:#1d9bf0;font-size:11px}
.fp-handle{font-size:11px;color:var(--mute)}
.fp-text{font-size:13.5px;line-height:1.5;margin:2px 0 8px;word-break:break-word}
.fp-eng{display:flex;gap:18px;font-size:11px;color:var(--mute)}
.fp-eng b{color:var(--ink);font-weight:700}
.oped{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:12px;padding:13px 15px 14px;margin-bottom:10px}
.op-kicker{font-size:9px;letter-spacing:.15em;text-transform:uppercase;font-weight:800;color:#06140e;background:var(--gold);padding:2px 7px;border-radius:5px}
.op-title{font-family:var(--disp);font-weight:700;font-size:18px;line-height:1.12;margin:9px 0 6px}
.op-body{font-size:13px;line-height:1.6;color:var(--ink)}
.op-body::first-letter{font-family:var(--disp);font-size:30px;font-weight:700;float:left;line-height:.9;margin:2px 7px 0 0;color:var(--gold)}
.op-by{font-size:11px;color:var(--mute);font-style:italic;margin-top:9px;text-align:right}

/* ---------- bracket challenge ---------- */
.bk-intro{font-size:13px;line-height:1.55;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.bk-scoring{font-size:11.5px;color:var(--mute);margin-top:7px;border-top:1px solid var(--line);padding-top:7px}
.bk-sub{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);margin:16px 2px 9px}
.bk-board{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.bk-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--line);font-size:13px}
.bk-row:last-child{border-bottom:0}
.bk-row.lead{background:linear-gradient(90deg,rgba(212,175,55,.16),transparent)}
.bk-rk{width:16px;text-align:center;color:var(--mute);font-weight:700;font-size:12px}
.bk-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#06140e;flex:0 0 auto}
.bk-nm{font-weight:700;flex:1}
.bk-tag{font-size:9px;font-weight:800;color:#06140e;background:var(--gold);padding:1px 6px;border-radius:5px;vertical-align:middle}
.bk-detail{font-size:10.5px;color:var(--mute)}
.bk-sc{font-family:var(--disp);font-weight:700;font-size:17px;min-width:24px;text-align:right}
.bk-pending{font-size:12.5px;line-height:1.5;color:var(--ink);background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:12px 14px}
.bk-fillrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.bk-fill{font-size:11px;color:var(--mute);background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:3px 10px}
.bk-fill.done{color:var(--gold);border-color:var(--gold)}
.pchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.bk-pick{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.bk-slot{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bk-lbl{font-size:12.5px;font-weight:700;width:118px;flex:0 0 auto}
.bk-sel{flex:1;min-width:0;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:13px;font-family:inherit}
.bk-sel:disabled{opacity:.7}
.bk-locked{font-size:12px;color:var(--mute);text-align:center;padding:4px}
.bk-reveal{margin-top:4px}
.bk-pcard{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:9px 12px;margin-bottom:8px}
.bk-pname{font-weight:800;font-size:13px;margin-bottom:3px}
.bk-ppath{font-size:12px;color:var(--ink)}
.bk-tree{display:flex;flex-direction:column;gap:12px}
.bk-rd-h{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:6px}
.bk-mt{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:6px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:5px}
.bk-mt .tbd{color:var(--mute);font-style:italic}
.bk-mt .win{font-weight:800;color:var(--gold)}
.bk-mt span:first-child{flex:1;text-align:right}
.bk-mt span:nth-child(3){flex:1;text-align:left}
.bk-mv{flex:0 0 auto;color:var(--mute);font-size:11px;min-width:30px;text-align:center}
.bk-qnote{font-size:11.5px;line-height:1.5;color:var(--mute);margin:-3px 2px 11px}
.grp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media (max-width:520px){.grp-grid{grid-template-columns:1fr}}
.grp{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden}
.grp-h{font-family:var(--disp);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:7px 11px;background:var(--card2);border-bottom:1px solid var(--line)}
.grp-row{display:flex;align-items:center;gap:7px;padding:6px 11px;font-size:12.5px;border-left:3px solid transparent}
.grp-row.q{border-left-color:var(--gold);background:linear-gradient(90deg,rgba(212,175,55,.10),transparent)}
.grp-row.q3{border-left-color:#5a8dd6;background:linear-gradient(90deg,rgba(90,141,214,.10),transparent)}
.grp-row.out{opacity:.5}
.grp-pos{width:13px;color:var(--mute);font-weight:700;font-size:11px}
.grp-tm{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grp-pl{color:var(--mute);font-size:10.5px;width:20px;text-align:right}
.grp-gd{color:var(--mute);font-size:11px;width:24px;text-align:right}
.grp-pts{font-weight:800;width:18px;text-align:right}
.grp-badge{width:30px;text-align:right;font-size:10px;font-weight:800;color:var(--gold)}
.grp-row.q3 .grp-badge{color:#5a8dd6}
.grp-legend{display:flex;flex-wrap:wrap;gap:12px;font-size:10.5px;color:var(--mute);margin:9px 2px 2px}
.grp-legend .lg{position:relative;padding-left:14px}
.grp-legend .lg::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:2px}
.grp-legend .lg.q::before{background:var(--gold)}
.grp-legend .lg.q3::before{background:#5a8dd6}
.grp-legend .lg.out::before{background:var(--line)}
/* ESPN-style knockout cards */
.kr-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:9px;-webkit-overflow-scrolling:touch}
.kr-tab{flex:0 0 auto;background:var(--card2);color:var(--mute);border:1px solid var(--line);border-radius:20px;padding:7px 15px;font-size:12.5px;font-weight:700;font-family:inherit}
.kr-tab.on{background:var(--gold);color:#06140e;border-color:var(--gold)}
.kr-note{font-size:11px;line-height:1.5;color:var(--mute);margin:0 2px 11px}
.kr-grp{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:6px 2px 8px}
.kbracket{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:520px){.kbracket{grid-template-columns:1fr}}
.kc{background:#fff;color:#1a1a1a;border:1px solid #d7d7dd;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.kc-top{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;font-size:10px;color:#6b7280;background:#f3f4f6;border-bottom:1px solid #e5e7eb}
.kc-num{font-weight:800;letter-spacing:.02em}
.kc-when{font-weight:600}
.kc-team{display:flex;align-items:center;gap:9px;padding:10px 12px;font-size:14px;font-weight:700;color:#111}
.kc-crest{color:#9aa0a6;font-size:12px}
.kc-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-team.slot .kc-nm{color:#8a9099;font-size:13px}
.kc-team.prov .kc-nm{color:#111}
.kc-seed{font-size:9.5px;font-weight:800;color:#06140e;background:#e9c84a;border-radius:4px;padding:1px 6px}
.kc-team.win{background:#eafaf0}
.kc-team.win .kc-nm{color:#0b7a3b}
.kc-mid{display:flex;align-items:center;justify-content:center;font-size:11px;color:#9aa0a6;border-top:1px dashed #e5e7eb;border-bottom:1px dashed #e5e7eb;padding:2px 0}
.kc-mid b{color:#111;font-size:13px;letter-spacing:.04em}
/* interactive cascading pick rows */
.kc-pick{display:flex;align-items:center;gap:9px;width:100%;padding:11px 12px;font-size:14px;font-weight:700;color:#111;background:#fff;border:0;border-left:3px solid transparent;font-family:inherit;text-align:left;cursor:pointer}
.kc-pick:disabled{cursor:default}
.kc-dot{color:#c2c6cc;font-size:12px;flex:0 0 auto}
.kc-pick .kc-nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-pick .kc-nm.slot{color:#8a9099;font-size:13px}
.kc-pick.empty{color:#b9bdc4}
.kc-pick.empty .kc-nm{color:#b9bdc4;font-style:italic}
.kc-pick.sel{background:#eafaf0;border-left-color:#0b7a3b}
.kc-pick.sel .kc-dot{color:#0b7a3b}
.kc-pick.sel .kc-nm{color:#0b7a3b;font-weight:800}
.kc-pick.won{box-shadow:inset 0 0 0 2px #d4af37}
.kc-vs{display:flex;align-items:center;justify-content:center;font-size:10px;color:#9aa0a6;border-top:1px dashed #e5e7eb;border-bottom:1px dashed #e5e7eb;padding:2px 0}
.kc-vs b{color:#111;font-size:13px;letter-spacing:.04em}
.kc-actual{font-size:10.5px;color:#0b7a3b;font-weight:700;padding:6px 12px;background:#f3faf5;border-top:1px solid #e5e7eb}
.bk-champ{font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin:0 0 11px}
.bk-champ b{color:var(--gold)}

/* ---------- google sheets sync box ---------- */
.sheet-box{margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.sheet-box h4{margin:0 0 6px;font-size:14px;font-weight:700}
.sheet-p{font-size:12px;color:var(--mute);margin:0 0 9px;line-height:1.5}
.sheet-url{min-height:0;height:38px;font-size:12px;font-family:var(--mono,monospace)}
.sheet-auto{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--chalk);margin-top:10px;cursor:pointer}
.sheet-auto input{width:16px;height:16px;accent-color:var(--gold)}
.sheet-note{font-size:10.5px;color:var(--mute2);margin:10px 0 0;line-height:1.5}

/* ---------- day chips ---------- */
.daybar{position:sticky;top:0;z-index:5;margin:6px -14px 4px;padding:9px 14px;
  background:linear-gradient(180deg,var(--pitch2) 70%,rgba(10,53,38,0));}
.daychips{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.daychips::-webkit-scrollbar{display:none}
.dchip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:11px;
  padding:6px 11px;font-size:11.5px;color:var(--mute);cursor:pointer;text-align:center;line-height:1.25;white-space:nowrap;font-weight:500}
.dchip b{display:block;color:var(--chalk);font-family:var(--disp);font-size:14px;letter-spacing:.04em;font-weight:600}
.dchip.on{background:linear-gradient(180deg,var(--gold),var(--gold2));border-color:var(--gold);color:#3a2606}
.dchip.on b{color:#241700}
.dchip.live{border-color:var(--live)}

/* ---------- picker ---------- */
.pickwrap{margin:10px 0 4px}
.pickwrap .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);margin-bottom:7px;font-weight:600}
.picker{display:flex;gap:8px;flex-wrap:wrap}
.pchip{flex:1 1 0;min-width:86px;display:flex;align-items:center;gap:8px;justify-content:center;
  border:1.5px solid var(--line);background:var(--card);border-radius:13px;padding:9px 8px;cursor:pointer;transition:.15s}
.pchip .av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:11px;font-family:var(--disp)}
.pchip .pn{font-size:13.5px;font-weight:600}
.pchip.on{box-shadow:0 0 0 2px currentColor inset; transform:translateY(-1px)}

/* ---------- day group ---------- */
.daygroup{margin-top:16px}
.dayhead{display:flex;align-items:center;gap:9px;margin:0 2px 9px}
.dayhead .dt{font-family:var(--disp);font-size:15px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.dayhead .ln{flex:1;height:1px;background:var(--line)}
.dayhead .cnt{font-size:10.5px;color:var(--mute2);letter-spacing:.05em}

/* ---------- match card ---------- */
.card{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);
  border-radius:16px;padding:13px 13px 11px;margin-bottom:11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card.final{border-color:rgba(244,201,93,.32)}
.card.live::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--live)}
.ctop{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.grp{font-family:var(--disp);font-size:10.5px;letter-spacing:.14em;color:var(--gold);font-weight:600;
  border:1px solid rgba(244,201,93,.3);border-radius:6px;padding:1px 6px}
.venue{font-size:10.5px;color:var(--mute2)}
.state{margin-left:auto;font-size:10.5px;font-weight:600;letter-spacing:.04em;display:flex;align-items:center;gap:5px}
.state.lock{color:var(--mute)}
.state.open{color:#7ee0b0}
.state.liveT{color:var(--live)}
.state.done{color:var(--gold)}

/* scoreboard */
.board{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;width:100%}
.team .fl{font-size:30px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))}
.team .nm{font-size:12.5px;font-weight:600;text-align:center;line-height:1.2;width:100%;
  min-height:2.4em;display:flex;align-items:center;justify-content:center;
  text-wrap:balance;word-break:break-word;hyphens:auto}
.rk{font-size:9px;color:var(--mute2);font-weight:600;font-family:var(--disp);letter-spacing:.02em;margin-left:3px;white-space:nowrap}
.odds{margin-top:12px}
.ot-lbl{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute2);font-weight:600;text-align:center;margin-bottom:5px}
.ot-lbl.dim{opacity:.6;text-transform:none;letter-spacing:.04em;font-size:9.5px;font-weight:500}
.odds-bar{display:flex;height:7px;border-radius:5px;overflow:hidden;background:#06160f;border:1px solid var(--line)}
.odds-bar span{display:block;height:100%}
.oh{background:#57bfa6}.od{background:#5b6f66}.oa{background:#e0985b}
.odds-lbl{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;font-weight:600}
.odds-lbl .ol-h{color:#7fd4c0}.odds-lbl .ol-d{color:var(--mute2)}.odds-lbl .ol-a{color:#e6b288}
.tbd .nm{color:var(--mute)}
.scorebox{display:flex;align-items:center;gap:6px;padding:0 2px}
.dash{font-family:var(--disp);font-size:26px;color:var(--mute2);font-weight:400;padding-bottom:4px}

/* stepper digit (split-flap feel) */
.stk{display:flex;flex-direction:column;align-items:center;gap:3px}
.stk .arw{width:34px;height:20px;border:none;background:transparent;color:var(--mute);font-size:13px;cursor:pointer;
  display:grid;place-items:center;border-radius:6px;padding:0}
.stk .arw:active{color:var(--gold)}
.digit{width:40px;height:46px;border-radius:9px;background:#06160f;border:1px solid var(--line2);
  display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:30px;color:var(--chalk);
  box-shadow:inset 0 -8px 14px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
  position:relative}
.digit.blank{color:var(--mute2)}
.digit::after{content:"";position:absolute;left:6px;right:6px;top:50%;height:1px;background:rgba(0,0,0,.5)}
.lbl-ht{font-size:9.5px;letter-spacing:.12em;color:var(--mute2);text-transform:uppercase;margin-top:7px;text-align:center;font-weight:600}
.htrow{margin-top:7px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.htrow .scorebox{transform:scale(.78)}
.htrow .dash{font-size:20px}
.locked .arw{visibility:hidden}
.locked .digit{background:#0a261b}

/* picks strip */
.picks{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:11px;padding-top:10px;border-top:1px dashed var(--line)}
.picks .cap{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute2);font-weight:600;margin-right:2px}
.ptag{display:flex;align-items:center;gap:5px;background:#06160f;border:1px solid var(--line);border-radius:999px;padding:3px 8px 3px 4px;font-size:11.5px}
.ptag .av{width:15px;height:15px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:8.5px;font-family:var(--disp)}
.ptag .sc{font-family:var(--disp);font-weight:600;font-size:12.5px;letter-spacing:.03em}
.ptag .pts{font-size:9.5px;color:var(--gold);font-weight:700;margin-left:1px}
.ptag.hid .sc{color:var(--mute2);letter-spacing:.16em}
.ptag.win{border-color:var(--gold2)}
.ptag.exact{box-shadow:0 0 0 1px var(--gold2) inset}

/* result button + panel */
.cbtns{display:flex;gap:8px;margin-top:10px}
.btn{flex:1;border:1px solid var(--line2);background:#06160f;color:var(--chalk);border-radius:11px;
  padding:9px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--body);letter-spacing:.02em}
.btn:active{transform:translateY(1px)}
.btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold2));border-color:var(--gold);color:#2a1c03}
.btn.ghost{background:transparent;color:var(--mute)}
.btn.big{padding:13px;font-size:15px}
.predsave{display:flex;align-items:center;gap:10px;margin-top:10px}
.predsave .btn{flex:0 0 auto;padding:8px 14px;font-size:12.5px}
.ps-stat{font-size:11px;color:var(--mute);font-weight:600}
.respanel{margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);display:none}
.respanel.open{display:block}
.respanel .rh{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:9px;text-align:center}
.koedit{display:flex;gap:8px;margin-bottom:11px}
.koedit input{flex:1;background:#06160f;border:1px solid var(--line2);border-radius:9px;color:var(--chalk);
  padding:8px 10px;font-size:13px;font-family:var(--body)}
.koedit input::placeholder{color:var(--mute2)}

/* finalized actual score */
.actual{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;margin-top:4px}
.actual .big{font-family:var(--disp);font-weight:700;font-size:40px;letter-spacing:.04em;text-align:center}
.actual .ht{font-size:11px;color:var(--mute);text-align:center}

/* ---------- standings ---------- */
.h2{font-family:var(--disp);font-size:16px;letter-spacing:.12em;text-transform:uppercase;margin:18px 2px 11px;font-weight:600;display:flex;align-items:center;gap:8px}
.h2 .ln{flex:1;height:1px;background:var(--line)}
.lbrow{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
.lbrow.king{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold2) inset,var(--shadow)}
.rank{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--mute2);width:22px;text-align:center}
.lbrow.king .rank{color:var(--gold)}
.lbav{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#06140e;font-weight:700;font-size:15px;font-family:var(--disp);flex:0 0 auto}
.lbmid{flex:1;min-width:0}
.lbmid .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.lbmid .st{font-size:10.5px;color:var(--mute);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap}
.lbmid .st span b{color:var(--chalk);font-weight:600}
.lbpts{text-align:right}
.lbpts .n{font-family:var(--disp);font-size:30px;font-weight:700;line-height:1}
.lbpts .u{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute2)}

/* daily table */
.daytable{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.dtr{display:grid;align-items:center;gap:4px;padding:9px 11px;border-bottom:1px solid var(--line)}
.dtr:last-child{border-bottom:none}
.dtr.hd{background:#06160f;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute);font-weight:600}
.dtr .dd{font-family:var(--disp);font-size:12.5px;letter-spacing:.03em}
.dtr .cell{font-family:var(--disp);font-size:14px;font-weight:600;text-align:center}
.dtr .cell.zero{color:var(--mute2);font-weight:400}
.dtr .cell .cum{display:block;font-size:9px;color:var(--mute2);font-family:var(--body);font-weight:500;letter-spacing:.02em;margin-top:1px}
.dtr .cell.best{color:var(--gold)}

.empty{text-align:center;color:var(--mute);padding:34px 20px;font-size:13.5px;line-height:1.6}
.empty .em{font-size:30px;display:block;margin-bottom:8px}

/* rules */
.rcard{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;box-shadow:var(--shadow)}
.rcard h3{font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;font-size:13.5px;margin:0 0 11px;color:var(--gold);font-weight:600}
.rule{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.45}
.rule:last-child{border-bottom:none}
.rpt{flex:0 0 auto;font-family:var(--disp);font-weight:700;font-size:14px;background:#06160f;border:1px solid var(--line2);
  border-radius:8px;min-width:46px;text-align:center;padding:5px 6px;color:var(--gold)}
.rule .tx b{color:var(--chalk)}
.rule .tx span{color:var(--mute)}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:center;gap:4px;
  background:linear-gradient(180deg,rgba(6,32,25,.4),var(--pitch1) 55%);

.tab{flex:1;max-width:120px;border:none;background:transparent;color:var(--mute);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;font-size:10px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.tab .ic{font-size:18px;line-height:1}
.tab.on{color:var(--gold)}
.tab.on .ic{transform:translateY(-1px)}

.foot{text-align:center;color:var(--mute2);font-size:11px;line-height:1.6;margin:22px 4px 6px}
.foot a,.linkbtn{color:var(--mute);text-decoration:underline;cursor:pointer;background:none;border:none;font-size:11px;font-family:var(--body)}
.banner{background:rgba(255,106,69,.12);border:1px solid rgba(255,106,69,.42);color:#ffd9cd;
  border-radius:12px;padding:10px 13px;font-size:12px;line-height:1.5;margin:10px 0 0}
.banner b{color:#fff}
.ta{width:100%;margin-top:10px;min-height:62px;background:#06160f;border:1px solid var(--line2);
  border-radius:10px;color:var(--chalk);padding:10px;font-size:12px;font-family:var(--body);resize:vertical}
.ta::placeholder{color:var(--mute2)}
.resbar{display:flex;align-items:center;gap:9px;margin-top:11px;padding:9px 11px;border-radius:10px;background:#06160f;border:1px solid var(--line2)}
.resbar.done{border-color:rgba(244,201,93,.4)}
.resbar .rlab{font-family:var(--disp);font-size:10px;letter-spacing:.12em;color:var(--gold);font-weight:600;flex:0 0 auto;white-space:nowrap}
.resbar.live .rlab{color:var(--live)}
.resbar .rcen{flex:1;text-align:center;min-width:0}
.resbar .rsc{font-family:var(--disp);font-size:23px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:7px;line-height:1}
.resbar .rfl{font-size:19px}
.resbar .rdash{color:var(--mute2)}
.resbar .rht-sub{font-size:10.5px;color:var(--mute);margin-top:3px;letter-spacing:.04em}
.resbar .rht-sub.dim{color:var(--mute2)}
.resbar .rsrc{flex:0 0 auto;font-size:9.5px;color:var(--mute2);letter-spacing:.03em;text-align:right}
.updrow{margin:11px 0 0}
.updrow .btn{width:100%}
.updstat{font-size:11px;color:var(--mute);text-align:center;margin:7px 4px 0;line-height:1.45;min-height:14px}
.pasterow{text-align:center;margin:8px 2px 0}
.pastebox{margin-top:9px;text-align:left;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:12px;padding:12px}
.pastebox .pmsg{font-size:12px;color:var(--mute);line-height:1.5;margin-bottom:9px}
.pastebox .pmsg b{color:var(--chalk)}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .35s ease}

// Strength-based projection used only when no real market odds are loaded for a match.
function projOdds(home, away){
  const ra=TEAM[home], rb=TEAM[away]; if(!ra||!rb) return null;
  const sup=Math.max(-1.8,Math.min(1.8,(ra.p-rb.p)/160));
  const pH=1/(1+Math.exp(-sup));
  let draw=0.30-0.10*Math.abs(sup); draw=Math.max(0.16,Math.min(0.30,draw));
  let H=Math.round(pH*(1-draw)*100), D=Math.round(draw*100), A=100-H-D;
  if(A<0){ H+=A; A=0; }
  return {h:H,d:D,a:A};
}
// Win odds shown on every match — real betting-market odds where loaded, else a projection.
function oddsHTML(m){
  const t=teamsOf(m);

  if(!o) return `<div class="odds"><div class="ot-lbl dim">Win odds — set once teams are known</div></div>`;
  const src = real ? 'betting markets' : 'projected';
  return `<div class="odds">

    <div class="odds-bar"><span class="oh" style="width:${o.h}%"></span><span class="od" style="width:${o.d}%"></span><span class="oa" style="width:${o.a}%"></span></div>

async function rawSet(key,value){

// Core scorer — works for any score (live or final)
function scoreCalc(p, r){
  if(!(r&&r.ftH!=null&&r.ftA!=null)) return null;
  if(!predComplete(p)) return {ft:0,ht:0,total:0,tag:'no pick'};
  let ft=0,tag='missed';
  if(p.ftH===r.ftH&&p.ftA===r.ftA){ft=5;tag='EXACT';}
  else if(sgn(p.ftH,p.ftA)===sgn(r.ftH,r.ftA)){ft=2;tag=(r.ftH===r.ftA?'draw':'winner');}
  let ht=0;
  if(p.htH!=null&&p.htA!=null&&r.htH!=null&&r.htA!=null){
    if(p.htH===r.htH&&p.htA===r.htA) ht=3;
    else if(sgn(p.htH,p.htA)===sgn(r.htH,r.htA)) ht=1;

  return {ft,ht,total:ft+ht,tag};
}
// Counts only when the match is final (used on cards / confirmed totals)
function scoreOf(p, r){ if(!(r&&r.final)) return null; return scoreCalc(p,r); }

// Per-player points. includeLive=true adds provisional points from in-progress matches.
function pointsFor(name, includeLive){
  let total=0, exact=0, winner=0, htb=0, liveDelta=0;
  MATCHES.forEach(m=>{
    const r=res(m.id); if(r.ftH==null||r.ftA==null) return;
    const fin=r.final===true; const lv=!fin && r.state==='in';
    if(!fin && !(includeLive&&lv)) return;
    const s=scoreCalc(pred(m.id,name),r); if(!s) return;
    total+=s.total;
    if(fin){ if(s.ft===5)exact++; else if(s.ft===2)winner++; if(s.ht>0)htb++; }

// Build a ranked table with confirmed + provisional points and live movement.
function liveTable(){

    const bonus=bracketBonus(p.name);
    return {name:p.name,color:p.color, conf:c.total+bonus, prov:v.total+bonus, bonus, exact:c.exact, winner:c.winner, htb:c.htb, liveDelta:v.total-c.total}; });
  const byConf=[...rows].sort((a,b)=>b.conf-a.conf||a.name.localeCompare(b.name));

function loadScoresCode(txt){
  const a=txt.indexOf('{'), b=txt.lastIndexOf('}');
  if(a<0||b<0) throw new Error('format');
  const obj=JSON.parse(txt.slice(a,b+1));
  const sc = obj.scores || (obj.odds?null:obj);   // bare object = scores
  let n=0;
  if(sc){ Object.keys(sc).forEach(id=>{
    if(!MATCHES.some(m=>m.id===id)) return;
    const e=sc[id]; if(!e||!Array.isArray(e.ft)||e.ft.length<2) return;
    const r=state.results[id]||{};
    if(r.final && r.source==='manual') return;
    r.ftH=Number(e.ft[0]); r.ftA=Number(e.ft[1]);
    if(Array.isArray(e.ht)&&e.ht.length>=2){ r.htH=Number(e.ht[0]); r.htA=Number(e.ht[1]); }
    r.live=!!e.live; r.final=!e.live; r.state=e.live?'in':'post';
    r.detail=e.live?'LIVE':'FT'; r.source='web';
    state.results[id]=r; n++;
  }); }
  if(obj.odds){ Object.keys(obj.odds).forEach(id=>{
    if(!MATCHES.some(m=>m.id===id)) return;
    const e=obj.odds[id]; if(!e) return;
    const h=Number(e.h), d=Number(e.d), a2=Number(e.a);
    if([h,d,a2].every(Number.isFinite)){ state.odds[id]={h,d,a:a2}; n++; }
  }); }
  return n;
}

// Normalize a fetched result and write it onto the matching scheduled match
function applyResults(list){
  let finals=0, liveN=0, koset=0; const usedKO={};
  list.forEach(it=>{
    if(it.home==null||it.away==null) return;
    const hN=resolveName(it.home), aN=resolveName(it.away);
    let m=MATCHES.find(x=>x.stage==='group'&&pairEq(x.home,x.away,hN,aN));
    let swap=false;
    if(m){ swap=(norm(m.home)!==norm(hN)); }
    else if(it.date){                                   // knockout: nearest kickoff time
      const evMs=Date.parse(it.date);
      if(Number.isFinite(evMs)){
        let best=null,bestD=18*3600*1000;
        MATCHES.filter(x=>x.stage==='ko'&&!usedKO[x.id]).forEach(x=>{
          const d=Math.abs(Date.parse(x.utc)-evMs); if(d<bestD){best=x;bestD=d;}
        });
        if(best){ m=best; usedKO[best.id]=1;
          const prev=state.koTeams[m.id]||{};
          if(prev.home!==hN||prev.away!==aN){ state.koTeams[m.id]={home:hN,away:aN}; koset++; }
          swap=false;
        }
      }
    }
    if(!m) return;
    if(!Number.isFinite(it.hs)||!Number.isFinite(it.as)) return;
    const r=state.results[m.id]||{};
    if(r.final && r.source==='manual') return;          // respect a result entered by hand
    const wasFinal=r.final;
    r.ftH = swap?it.as:it.hs; r.ftA = swap?it.hs:it.as;
    if(Number.isFinite(it.htHs)&&Number.isFinite(it.htAs)){ r.htH=swap?it.htAs:it.htHs; r.htA=swap?it.htHs:it.htAs; }
    r.state = it.final?'post':'in';
    r.detail = it.detail || (it.final?'FT':'LIVE');
    r.source='web'; r.final=!!it.final;
    state.results[m.id]=r;
    if(r.final && !wasFinal) finals++;
    if(!it.final) liveN++;
  });
  return {finals,liveN,koset};
}

// Path 1: ESPN public feed (best data when the sandbox allows the request)
async function fetchEspn(){
  const url='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=1000';
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),7000);
  let resp; try{ resp=await fetch(url,{headers:{accept:'application/json'},signal:ctrl.signal}); } finally{ clearTimeout(to); }
  if(!resp.ok) throw new Error('http');
  const data=await resp.json();
  const out=[];
  (data.events||[]).forEach(ev=>{
    const comp=ev.competitions&&ev.competitions[0]; if(!comp)return;
    const cs=comp.competitors||[]; if(cs.length<2)return;
    const eh=cs.find(c=>c.homeAway==='home')||cs[0];
    const ea=cs.find(c=>c.homeAway==='away')||cs[1];
    const stt=(comp.status&&comp.status.type)||{}; const st=stt.state;
    if(st!=='in'&&st!=='post') return;
    const hs=Number(eh.score), as=Number(ea.score);
    if(!Number.isFinite(hs)||!Number.isFinite(as)) return;
    const htOf=c=>{ const ls=c&&c.linescores; return (Array.isArray(ls)&&ls[0]&&ls[0].value!=null)?Number(ls[0].value):null; };
    const hh=htOf(eh), ah=htOf(ea);
    out.push({ home:resolveTeam(eh.team)||(eh.team&&eh.team.displayName),
               away:resolveTeam(ea.team)||(ea.team&&ea.team.displayName),
               hs, as,
               htHs:(Number.isFinite(hh)&&Number.isFinite(ah))?hh:null,
               htAs:(Number.isFinite(hh)&&Number.isFinite(ah))?ah:null,
               final: st==='post'||stt.completed===true,
               detail: stt.shortDetail||stt.detail||'', date: ev.date });
  });
  return out;
}

// Path 2: ask Claude (via the Anthropic API the artifact can reach) to web-search live scores
async function fetchViaClaude(){
  const prompt =
    'Search the web right now for the latest 2026 FIFA World Cup scores — every match that has FINISHED or is IN PROGRESS. '+
    'Reply with ONLY a JSON object, no prose, no markdown fences, in exactly this shape:\n'+
    '{"matches":[{"home":"Mexico","away":"South Africa","hs":2,"as":0,"ht_hs":1,"ht_as":0,"status":"FT"}]}\n'+
    'hs/as are integer goals (current score if live, final if finished). ht_hs/ht_as are half-time goals if you know them, otherwise omit them. '+
    'status is "FT" for finished or "LIVE" for in progress. Use common country names (e.g. "USA", "South Korea", "Turkey"). '+
    'Include only matches that have started. If none have started, reply {"matches":[]}.';
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000,
      messages:[{role:'user',content:prompt}],
      tools:[{type:'web_search_20250305',name:'web_search'}] })
  });
  if(!resp.ok) throw new Error('api');
  const data=await resp.json();
  const text=(data.content||[]).filter(b=>b&&b.type==='text').map(b=>b.text).join('\n');
  const a=text.indexOf('{'), b=text.lastIndexOf('}');
  if(a<0||b<0) throw new Error('parse');
  const obj=JSON.parse(text.slice(a,b+1));
  return (obj.matches||[]).map(mt=>({
    home:mt.home, away:mt.away,
    hs:Number(mt.hs), as:Number(mt.as),
    htHs: mt.ht_hs!=null?Number(mt.ht_hs):null,
    htAs: mt.ht_as!=null?Number(mt.ht_as):null,
    final:(String(mt.status||'').toUpperCase()==='FT'),
    detail:String(mt.status||'').toUpperCase()
  }));
}

/* ============================ TOTALS ============================ */
function totals(){
  const T={}; PLAYERS.forEach(p=>T[p.name]={total:0,exact:0,winner:0,htb:0,picks:0,done:0});
  MATCHES.forEach(m=>{
    const r=res(m.id);
    PLAYERS.forEach(p=>{
      const pr=pred(m.id,p.name);
      if(predComplete(pr)) T[p.name].picks++;
      const s=scoreOf(pr,r);
      if(s){ T[p.name].done++; T[p.name].total+=s.total;
        if(s.ft===5)T[p.name].exact++; else if(s.ft===2)T[p.name].winner++;
        if(s.ht>0)T[p.name].htb++; }
    });
  });
  return T;
}
function ranked(){
  const T=totals();
  return PLAYERS.map(p=>({name:p.name,color:p.color,...T[p.name]}))
    .sort((a,b)=> b.total-a.total || b.exact-a.exact || b.winner-a.winner || a.name.localeCompare(b.name));
}

/* ============================ RENDER: digit stepper ============================ */
function stepper(mid,who,fld,val,locked,small){
  const blank = val==null;
  const show = blank? '–' : val;
  if(locked){
    return `<div class="stk"><div class="digit ${blank?'blank':''}">${show}</div></div>`;
  }
  return `<div class="stk">
    <button class="arw" data-act="inc" data-mid="${mid}" data-who="${who}" data-fld="${fld}">▲</button>

}

// Per-match family points breakdown (works for live or final scores)
function breakdownHTML(m){
  const r=res(m.id); const done=resFinal(m.id);
  const rows=PLAYERS.map(pl=>{
    const pp=pred(m.id,pl.name); const complete=predComplete(pp);
    const s=scoreCalc(pp,r);
    let detail, tot=0;
    if(!complete){ detail='No pick'; }
    else{
      tot = s? s.total:0;
      const ftTag = s.ft===5?'Exact +5' : s.ft===2?((r.ftH===r.ftA)?'Draw +2':'Winner +2') : 'Miss +0';
      const hasHt = pp.htH!=null&&pp.htA!=null&&r.htH!=null&&r.htA!=null;
      const htTag = hasHt ? (s.ht===3?' · HT +3': s.ht===1?' · HT +1':' · HT +0') : '';
      detail = `${pp.ftH}–${pp.ftA}${pp.htH!=null?` (${pp.htH}–${pp.htA})`:''} · ${ftTag}${htTag}`;
    }
    return {pl,tot,detail,complete};
  }).sort((a,b)=> b.tot-a.tot || a.pl.name.localeCompare(b.pl.name));
  const best=Math.max(0,...rows.map(x=>x.tot));
  return `<div class="bd ${done?'':'prov'}">
    <div class="bd-head"><span>${done?'Points this match':'Points if it ends now'}</span>${done?'':'<span class="bd-prov">LIVE</span>'}</div>
    ${rows.map(x=>`<div class="bd-row ${x.tot>0&&x.tot===best?'top':''}">
      <span class="bd-av" style="background:${x.pl.color}">${avInit(x.pl.name)}</span>
      <span class="bd-mid"><span class="bd-nm">${x.pl.name}</span><span class="bd-dt ${!x.complete?'none':''}">${x.detail}</span></span>
      <span class="bd-pts ${x.tot>0?'pos':''}">${x.tot}</span>
    </div>`).join('')}
  </div>`;
}

// Every scoring single-game performance, ranked
function singleGameHauls(){
  const list=[];
  MATCHES.forEach(m=>{ if(!resFinal(m.id)) return; const r=res(m.id);
    PLAYERS.forEach(pl=>{ const s=scoreOf(pred(m.id,pl.name),r);
      if(s&&s.total>0) list.push({name:pl.name,color:pl.color,pts:s.total,exact:s.ft===5,ht:s.ht,m,r}); });
  });
  list.sort((a,b)=> b.pts-a.pts || (b.exact-a.exact) || a.name.localeCompare(b.name));
  return list;
}

function viewStandings(){

      </div>
      <div class="lbpts"><div class="n">${p.total}</div><div class="u">pts</div></div>
    </div>`;
  }).join('');

  // daily running table
  const playedDays = DAYS.filter(d=>MATCHES.some(m=>m.day===d&&resFinal(m.id)));
  let daily='';
  if(playedDays.length){
    const cum={}; PLAYERS.forEach(p=>cum[p.name]=0);

    const head = `<div class="dtr hd" style="${colTmpl}"><div>Day</div>${PLAYERS.map(p=>`<div style="text-align:center;color:${p.color}">${avInit(p.name)}</div>`).join('')}</div>`;
    const rows = playedDays.map(d=>{
      const per={}; PLAYERS.forEach(p=>per[p.name]=0);
      MATCHES.filter(m=>m.day===d&&resFinal(m.id)).forEach(m=>{
        PLAYERS.forEach(p=>{ const s=scoreOf(pred(m.id,p.name),res(m.id)); if(s)per[p.name]+=s.total; });
      });
      PLAYERS.forEach(p=>cum[p.name]+=per[p.name]);
      const best=Math.max(...PLAYERS.map(p=>per[p.name]));
      const s=dayShort(d);
      return `<div class="dtr" style="${colTmpl}">
        <div class="dd">${s.d.replace(/^\w+ /,'')}</div>

          const v=per[p.name]; const isBest=v>0&&v===best;

/* ---------- NEWS: auto-generated headlines from the data ---------- */
function chronFinals(){ return MATCHES.filter(m=>resFinal(m.id)).sort((a,b)=>Date.parse(a.utc)-Date.parse(b.utc)); }
function chronPts(name){ return chronFinals().filter(m=>predComplete(pred(m.id,name)))
  .map(m=>{ const s=scoreOf(pred(m.id,name),res(m.id)); return {m, pts:s?s.total:0}; }); }
function ptsOver(name, exclude){ let t=0; MATCHES.forEach(m=>{ if(exclude&&exclude.has(m.id))return; if(!resFinal(m.id))return;
  const s=scoreOf(pred(m.id,name),res(m.id)); if(s)t+=s.total; }); return t; }
function rankList(exclude){ return PLAYERS.map(p=>({name:p.name,color:p.color,total:ptsOver(p.name,exclude)}))
  .sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name)).map((r,i)=>({...r,rank:i+1})); }
function ord(n){ return n+(['th','st','nd','rd'][(n%100>>3^1&&n%10)||0]||'th'); }

function viewNews(){
  const finals=chronFinals();
  if(!finals.length){
    return `<div class="h2">📰 News<span class="ln"></span></div>
      <div class="empty"><span class="em">📰</span>No headlines yet. Once matches finish and points are scored, the latest table moves, streaks and trends show up here.</div>`;
  }
  const lastDay=finals[finals.length-1].day;
  const recent=new Set(finals.filter(m=>m.day===lastDay).map(m=>m.id));
  const now=rankList(null), prev=rankList(recent);
  const prevRank={}, prevTot={}; prev.forEach(r=>{prevRank[r.name]=r.rank; prevTot[r.name]=r.total;});
  const st={}; PLAYERS.forEach(p=>st[p.name]=playerStats(p.name));
  const mdPts={}; PLAYERS.forEach(p=>mdPts[p.name]=now.find(r=>r.name===p.name).total-prevTot[p.name]);
  const col=n=>colorOf(n);
  const H=[]; // {tag, cls, title, sub, who}
  const push=(tag,cls,title,sub,who)=>H.push({tag,cls,title,sub,who});

  // 1) Leader
  const L=now[0], second=now[1], gap=L.total-(second?second.total:0);
  if(prev[0] && prev[0].name!==L.name){
    push('Leaderboard','lead',`${L.name} storms to the summit`,
      `Overtakes ${prev[0].name} after ${fmtDay(lastDay)} and tops the table on ${L.total} pts${gap>0?`, ${gap} clear`:''}.`, L.name);
  } else {
    push('Leaderboard','lead',`${L.name} stays top of the table`,
      gap>0?`Holds a ${gap}-point cushion (${L.total} pts) over ${second.name} heading out of ${fmtDay(lastDay)}.`:`Level on ${L.total} pts at the top — it's a dead heat with ${second?second.name:''}.`, L.name);
  }
  // 2) Title race tightening / second place chasing
  if(second && gap<=2){
    push('Race','race',`The chase is on — ${second.name} closing in`,
      `Just ${gap===0?'level':gap+' point'+(gap>1?'s':'')} behind ${L.name}. One big matchday flips this.`, second.name);
  }
  // 3) Biggest climber on the latest matchday
  const climbers=now.map(r=>({...r, mv:(prevRank[r.name]||r.rank)-r.rank})).filter(r=>r.mv>0).sort((a,b)=>b.mv-a.mv);
  if(climbers[0]){ const c=climbers[0];
    push('Mover','up',`${c.name} surges up the table`,
      `Climbs ${c.mv} spot${c.mv>1?'s':''} to ${ord(c.rank)} after banking ${mdPts[c.name]} pt${mdPts[c.name]===1?'':'s'} on ${fmtDay(lastDay)}.`, c.name); }
  // 4) Biggest faller
  const fallers=now.map(r=>({...r, mv:(prevRank[r.name]||r.rank)-r.rank})).filter(r=>r.mv<0).sort((a,b)=>a.mv-b.mv);
  if(fallers[0]){ const f=fallers[0];
    push('Mover','down',`${f.name} slips down the order`,
      `Drops ${Math.abs(f.mv)} place${Math.abs(f.mv)>1?'s':''} to ${ord(f.rank)} — only ${mdPts[f.name]} pt${mdPts[f.name]===1?'':'s'} from the latest games.`, f.name); }
  // 5) Matchday star
  const star=[...PLAYERS].map(p=>({name:p.name,pts:mdPts[p.name]})).sort((a,b)=>b.pts-a.pts)[0];
  if(star && star.pts>0){
    push('Matchday','star',`${star.name} owns ${fmtDay(lastDay)}`,
      `Top scorer of the matchday with ${star.pts} points banked.`, star.name); }
  // 6) Hottest active streak
  const hot=[...PLAYERS].map(p=>({name:p.name,s:st[p.name].curStreak})).sort((a,b)=>b.s-a.s)[0];
  if(hot && hot.s>=2){
    push('Form','hot',`${hot.name} is on fire 🔥`,
      `${hot.s} games in a row with points and counting — the family's form player right now.`, hot.name); }
  // 7) Longest run of the tournament (record)
  const best=[...PLAYERS].map(p=>({name:p.name,s:st[p.name].bestStreak})).sort((a,b)=>b.s-a.s)[0];
  if(best && best.s>=3){
    push('Record','rec',`${best.name} sets the streak benchmark`,
      `Longest run of the tournament: ${best.s} straight games on the scoreboard.`, best.name); }
  // 8) Streak snapped on the latest matchday
  let snap=null;
  PLAYERS.forEach(p=>{ const g=chronPts(p.name); if(g.length>=2 && g[g.length-1].pts===0){
    let run=0; for(let i=g.length-2;i>=0;i--){ if(g[i].pts>0)run++; else break; }
    if(run>=2 && (!snap||run>snap.run)) snap={name:p.name, run, m:g[g.length-1].m}; } });
  if(snap){ push('Form','cold',`${snap.name}'s hot streak comes to an end`,
      `A ${snap.run}-game scoring run stopped by a blank in ${matchLine(snap.m,res(snap.m.id))}.`, snap.name); }
  // 9) Exact-score watch
  const exa=[...PLAYERS].map(p=>({name:p.name,e:st[p.name].exact})).sort((a,b)=>b.e-a.e)[0];
  if(exa && exa.e>0){
    push('Trend','exact',`${exa.name} the sharpshooter`,
      `Leads the family on exact scorelines with ${exa.e} spot-on call${exa.e>1?'s':''}.`, exa.name); }
  // 10) Most reliable (hit rate)
  const rel=[...PLAYERS].map(p=>({name:p.name,h:st[p.name].hit,gp:st[p.name].gp})).filter(r=>r.gp>=3).sort((a,b)=>b.h-a.h)[0];
  if(rel && rel.h>0){
    push('Trend','rel',`${rel.name} the most dependable`,
      `Has scored points in ${Math.round(rel.h*100)}% of games — the family's banker.`, rel.name); }

  const cards=H.slice(0,9).map(h=>`<div class="news-card nc-${h.cls}" style="--accent:${col(h.who)}">
      <div class="nc-tag">${h.tag}</div>
      <div class="nc-title">${h.title}</div>
      <div class="nc-sub">${h.sub}</div>
    </div>`).join('');

  /* ---- extra context for fan posts + op-eds ---- */
  let seed=(finals.length*97+(L?L.total:0)*13+(lastDay?lastDay.length:0))>>>0;
  const rnd=()=>{ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; };
  const fmtK=n=>n>=1000?(n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,'')+'K':''+n;
  const eng=()=>`<div class="fp-eng"><span>💬 <b>${fmtK(8+Math.floor(rnd()*240))}</b></span><span>🔁 <b>${fmtK(20+Math.floor(rnd()*900))}</b></span><span>❤️ <b>${fmtK(120+Math.floor(rnd()*9000))}</b></span></div>`;
  // matchday-low player ("cooked") and biggest blowout of the latest matchday
  const mdSort=[...PLAYERS].map(p=>({name:p.name,pts:mdPts[p.name]})).sort((a,b)=>a.pts-b.pts);
  const cooked = snap ? {name:snap.name} : (mdSort[0]&&mdSort[0].pts<=1?mdSort[0]:null);
  let big=null;
  finals.filter(m=>recent.has(m.id)).forEach(m=>{ const r=res(m.id); if(!r||r.ftH==null)return;
    const sc=Math.abs(r.ftH-r.ftA)*2+(r.ftH+r.ftA); if(!big||sc>big.sc){ const t=teamsOf(m);
      big={sc,marg:Math.abs(r.ftH-r.ftA),home:t.home,away:t.away,h:r.ftH,a:r.ftA}; } });

  // candidate fan posts — only those whose data condition holds
  const fans=[];
  const FP=(av,name,handle,tick,text)=>fans.push(`<div class="fanpost"><div class="fp-head">
      <div class="fp-av">${av}</div><div><div class="fp-name">${name}${tick?'<span class="fp-tick">✔</span>':''}</div>
      <div class="fp-handle">${handle} · ${Math.floor(1+rnd()*58)}m</div></div></div>
      <div class="fp-text">${text}</div>${eng()}</div>`);
  if(L) FP('🐐',`${L.name} Nation`,`@${L.name.toLowerCase()}szn`,true,
    `${L.name} is just built different rn 🐐📈 ${L.total} pts and not lookin back. everyone else playin for 2nd fr fr 💀 #MatchdayWire`);
  if(second && gap<=2) FP('😳','Title Race TV','@titleracetv',true,
    `chat is this real?? ${second.name} is ${gap===0?'DEAD LEVEL with':gap+' off'} ${L.name} 😭🔥 this race is COOKING, one matchday n it flips ngl`);
  if(star && star.pts>0) FP('🔥','Hot Corner','@hotcornerfc',false,
    `${star.name} woke up and chose violence on ${fmtDay(lastDay)} ⚡ ${star.pts} pts in one matchday?? understood the assignment ✅ no notes`);
  if(hot && hot.s>=2) FP('📈',`${hot.name} Truther`,`@${hot.name.toLowerCase()}_truther`,false,
    `${hot.name} on a ${hot.s}-game heater rn 🔥🔥 he's HIM. nobody checkin for this kinda form, lowkey goated tbh`);
  if(exa && exa.e>0) FP('🎯','Stat Boy','@statboy_99',true,
    `${exa.name} callin exact scorelines like he got the cheat codes 🎯 ${exa.e} on the dot this tourney. crystal ball energy ong 🔮`);
  if(big && big.marg>=3) FP('⚽','Goal Gremlin','@goalgremlin',false,
    `${big.home} ${big.h}-${big.a} ${big.away} 😭😭 they ATE and left zero crumbs 🍽️🔥 absolute scenes, somebody check on the other side man`);
  if(cooked) FP('🚨','Prediction Police','@predictionpolice',false,
    `not ${cooked.name} gettin absolutely COOKED 💀☠️ from hero to zero real quick. it's giving down bad 📉 we've all been there king 🙏`);
  FP('🫠','Mid Table Merchant','@midtable_merch',false,
    `ngl some of these picks been MID this week no cap 🫠 lock in chat, the GOATs are pullin away 🙏 #banter`);
  const fanHTML = fans.length? `<div class="news-section">🗣️ Fan Zone</div>${fans.slice(0,5).join('')}` : '';

  // op-eds — pundit columns
  const ops=[];
  ops.push(`<div class="oped"><span class="op-kicker">The Big Read</span>
    <div class="op-title">The lead is real — but is it safe?</div>
    <div class="op-body">${L?`${L.name} is no longer merely leading this family title race; they are dictating its terms, ${L.total} points the product of nerve as much as luck. ${gap>2?`A ${gap}-point cushion over ${second?second.name:'the field'} reads as comfortable, yet tournaments are decided in single rotten afternoons, and ${second?second.name:'the chasers'} need only one to turn comfort into crisis.`:`${second?second.name:'The chasing pack'} sits close enough to smell it — ${gap===0?'level on points':'just '+gap+' back'} — and at these margins a single exact scoreline rewrites the table.`} The question is no longer who leads, but whether the front-runner has the stomach to close.`:'Once the results roll in, the story of this title race will be written right here.'}</div>
    <div class="op-by">— Mara Vélez · Chief Football Columnist</div></div>`);
  if(rnd()<0.5 || !cooked){
    ops.push(`<div class="oped"><span class="op-kicker">Tactical Verdict</span>
      <div class="op-title">Form is a flat circle</div>
      <div class="op-body">${hot&&hot.s>=2?`${hot.name}'s ${hot.s}-game scoring run has stopped looking like variance and started looking like method. `:'Consistency, not fireworks, wins predictor leagues. '}${exa&&exa.e>0?`Where others hedge, ${exa.name} commits: ${exa.e} exact scoreline${exa.e>1?'s':''} is the signature of someone backing a read rather than splitting the difference. `:''}The table, as ever, rewards conviction and quietly punishes the timid, who tend to finish exactly mid.</div>

// Per-player season stats over finished matches the player actually predicted
function playerStats(name){
  const games=[];
  MATCHES.slice().sort((a,b)=>Date.parse(a.utc)-Date.parse(b.utc)).forEach(m=>{
    if(!resFinal(m.id)) return;
    const pp=pred(m.id,name); if(!predComplete(pp)) return;
    const s=scoreOf(pp,res(m.id)); const pts=s?s.total:0;
    games.push({pts, exact:!!(s&&s.ft===5), winner:!!(s&&s.ft===2), ht:s?s.ht:0});
  });
  const gp=games.length;
  const total=games.reduce((a,g)=>a+g.pts,0);
  const exact=games.filter(g=>g.exact).length;
  const winner=games.filter(g=>g.winner).length;
  const htb=games.filter(g=>g.ht>0).length;
  const scored=games.filter(g=>g.pts>0).length;
  let best=0,run=0; games.forEach(g=>{ if(g.pts>0){run++;best=Math.max(best,run);}else run=0; });
  let cur=0; for(let i=games.length-1;i>=0;i--){ if(games[i].pts>0)cur++; else break; }
  return { name, gp, total, exact, winner, htb,
    ppg: gp? total/gp : 0, hit: gp? scored/gp : 0,
    curStreak:cur, bestStreak:best, bestGame: games.reduce((mx,g)=>g.pts>mx?g.pts:mx,0) };
}

  // leaders
  const byPPG=[...rows].sort((a,b)=>b.ppg-a.ppg)[0];
  const byExact=[...rows].sort((a,b)=>b.exact-a.exact||b.total-a.total)[0];

  const leader=(r,val,lbl)=>`<div class="lead-card">

    </div>

    <div class="h2">Player stats<span class="ln"></span></div>
    ${rows.map(r=>`<div class="stat-card">
      <div class="sc-top">
        <span class="sc-av" style="background:${r.color}">${avInit(r.name)}</span>
        <span class="sc-nm">${r.name}</span>
        <span class="sc-total">${r.total}<small>pts</small></span>
      </div>
      <div class="sc-grid">
        <div class="sc-cell"><b>${r.ppg.toFixed(1)}</b><span>per game</span></div>
        <div class="sc-cell"><b>${r.gp}</b><span>games</span></div>
        <div class="sc-cell"><b>${Math.round(r.hit*100)}%</b><span>hit rate</span></div>
        <div class="sc-cell"><b>${r.exact}</b><span>exact</span></div>
        <div class="sc-cell"><b>${r.winner}</b><span>winners</span></div>
        <div class="sc-cell"><b>${r.htb}</b><span>HT bonus</span></div>
        <div class="sc-cell"><b>${r.curStreak>0?'🔥 '+r.curStreak:'—'}</b><span>active streak</span></div>
        <div class="sc-cell"><b>${r.bestStreak}</b><span>longest run</span></div>
        <div class="sc-cell"><b>${r.bestGame}</b><span>best game</span></div>

function viewBracket(){
  const who=state.ui.player, st=groupStandings();
  const started=bracketStarted();
  const myPicks=bracketOf(who);

  // player chooser with progress
  const chips=PLAYERS.map(p=>{ const done=bracketComplete(p.name); const r=r32Picked(p.name);
    return `<button class="pchip ${p.name===who?'on':''}" data-player="${p.name}" style="--c:${p.color}">
      <span class="pdot" style="background:${p.color}"></span>${p.name}${done?' ✓':(r?` ·${r}/16`:'')}</button>`; }).join('');

  // accuracy board / +20
  const ranked=PLAYERS.map(p=>({name:p.name,color:p.color,champ:bracketChampion(p.name,st),...bracketScore(p.name)}))
    .sort((x,y)=>y.score-x.score||x.name.localeCompare(y.name));
  const leaders=bracketLeaders();
  const board = started ? `<div class="bk-board">${ranked.map((r,i)=>`
      <div class="bk-row ${leaders.has(r.name)?'lead':''}">
        <span class="bk-rk">${i+1}</span>
        <span class="bk-av" style="background:${r.color}">${avInit(r.name)}</span>
        <span class="bk-nm">${r.name}${leaders.has(r.name)?' <span class="bk-tag">+20 🏆</span>':''}</span>
        <span class="bk-detail">${r.correct}/${r.total} correct${r.champ?' · 🏆 '+r.champ:''}</span>
        <span class="bk-sc">${r.score}</span>
      </div>`).join('')}</div>`
    : `<div class="bk-pending">🔒 The <b>+20</b> goes to the most accurate bracket once the knockouts kick off (June 28). Fill yours out below — here's everyone's progress:
        <div class="bk-fillrow">${PLAYERS.map(p=>`<span class="bk-fill ${bracketComplete(p.name)?'done':''}">${bracketComplete(p.name)?'✓':r32Picked(p.name)+'/16'} ${p.name}</span>`).join('')}</div></div>`;

  // group qualification tracker
  const qual = (()=>{ const thirds=bestThirds(st);
    const grid=GROUP_LETTERS.map(g=>{ const rows=st[g]||[];
      return `<div class="grp"><div class="grp-h">Group ${g}</div>`+
        rows.map((r,i)=>{ const adv=i<2, t3=i===2&&thirds.has(g);
          const cls=adv?'q':(t3?'q3':'out'); const badge=adv?'✓':(t3?'3rd':'✗');
          return `<div class="grp-row ${cls}"><span class="grp-pos">${i+1}</span>
            <span class="grp-tm">${r.team}</span><span class="grp-pl">${r.P}p</span>
            <span class="grp-gd">${(r.GF-r.GA)>=0?'+':''}${r.GF-r.GA}</span>
            <span class="grp-pts">${r.Pts}</span><span class="grp-badge">${badge}</span></div>`; }).join('')+`</div>`; }).join('');
    return `<div class="bk-sub">🌍 Road to the Round of 32</div>
      <div class="bk-qnote">Top 2 in every group advance, plus the 8 best third-placed teams. Live from real results — <b>provisional</b> until the group stage ends June 27.</div>
      <div class="grp-grid">${grid}</div>
      <div class="grp-legend"><span class="lg q">✓ advancing</span> <span class="lg q3">3rd · best-8</span> <span class="lg out">✗ out / eliminated</span></div>`; })();

  // interactive cascading bracket
  const BK_ROUNDS=[['Round of 32','R32'],['Round of 16','R16'],['Quarter-final','QF'],['Semi-final','SF'],['Final','Final']];
  const bkRound=state.ui.bkRound||'Round of 32';
  const part=(n,side)=>{ const p=participant(n,side,who,st); if(p&&!p.empty) return p;
    const e=brEntry(n), lbl=side==='a'?e.a:e.b, m=lbl.match(/^W(\d+)$/);
    return {label:m?('Winner '+m[1]):lbl, team:null, empty:true}; };
  const pickRow=(n,side)=>{ const p=part(n,side); const sel=myPicks[n]===side;
    const aw=actualWinner(n); const isAw=aw&&p.team===aw; const nm=p.team||p.label;
    const dis=p.empty||started;
    return `<button class="kc-pick ${sel?'sel':''} ${isAw?'won':''} ${p.empty?'empty':''}" ${dis?'disabled':''} data-act="bkPick" data-num="${n}" data-side="${side}">
      <span class="kc-dot">${sel?'●':'○'}</span><span class="kc-nm ${p.team?'':'slot'}">${nm}</span>
      ${p.team&&p.prov?`<span class="kc-seed">${p.label}</span>`:''}</button>`; };
  const shownRounds = bkRound==='Final' ? ['Semi-final','Final','Third place'] : [bkRound];
  const cards=shownRounds.map(rd=>{ const ns=BR.filter(e=>roundOf(e.n)===rd).map(e=>e.n); if(!ns.length)return'';
    const hd = shownRounds.length>1?`<div class="kr-grp">${rd}</div>`:'';
    return hd+ns.map(n=>{ const e=brEntry(n); const aw=actualWinner(n); const km='k'+(n-73);
      const rr=resFinal(km)?state.results[km]:null;
      return `<div class="kc">
        <div class="kc-top"><span class="kc-num">Match ${n}</span><span class="kc-when">${fmtDay(e.day)}${e.et?' · '+e.et:''}${e.venue?' · '+e.venue:''}</span></div>
        ${pickRow(n,'a')}
        <div class="kc-vs">${rr?`<b>${rr.ftH}–${rr.ftA}</b>`:'vs'}</div>
        ${pickRow(n,'b')}
        ${aw?`<div class="kc-actual">✔ ${aw} advanced</div>`:''}</div>`; }).join(''); }).join('');
  const champ=bracketChampion(who,st);
  const bracketUI=`
    <div class="kr-tabs">${BK_ROUNDS.map(([r,lbl])=>`<button class="kr-tab ${bkRound===r?'on':''}" data-act="bkRound" data-round="${r}">${lbl}</button>`).join('')}</div>
    <div class="kr-note">Tap a team to advance it — your picks flow into the next round automatically. ${started?'<b>Bracket locked — the knockouts have begun.</b>':'Picks lock when the Round of 32 kicks off June 28.'}</div>
    <div class="bk-champ">🏆 ${who}'s pick to win it all: <b>${champ||'— keep picking —'}</b></div>
    <div class="kbracket">${cards}</div>
    ${started?'':`<div class="predsave"><button class="btn gold" data-act="saveBracket">💾 Save ${who}'s bracket</button><span class="ps-stat" id="bk-stat"></span></div>`}`;

  // reveal everyone once knockouts begin
  const reveal = started ? `<div class="bk-sub">Everyone's brackets</div>${PLAYERS.map(p=>{
    const f1=participant(104,'a',p.name,st), f2=participant(104,'b',p.name,st);
    const nm=x=>x?(x.team||x.label):'—';
    return `<div class="bk-pcard" style="border-left-color:${p.color}">
      <div class="bk-pname" style="color:${p.color}">${p.name}</div>
      <div class="bk-ppath">🏆 ${bracketChampion(p.name,st)||'—'} &nbsp;·&nbsp; Final: ${nm(f1)} v ${nm(f2)}</div>
    </div>`; }).join('')}` : '';

  return `<div class="h2">🗺️ Bracket Challenge<span class="ln"></span></div>
    <div class="bk-intro">Fill out the whole knockout bracket: <b>pick a winner for every match</b> and your picks cascade from the Round of 32 all the way to the Final. The most accurate bracket earns a one-time <b>+20 points</b> on top of your match points.
      <div class="bk-scoring">Correct winner scores by round: <b>R32 +1</b> · <b>R16 +2</b> · <b>QF +3</b> · <b>SF +5</b> · <b>Final +8</b>.</div>
    </div>
    <div class="bk-board-wrap">${board}</div>
    ${qual}
    <div class="bk-sub">${started?`${who}'s bracket (locked)`:`✏️ Fill out ${who}'s bracket`}</div>
    <div class="pchips">${chips}</div>
    ${bracketUI}
    ${reveal}
    <div class="foot">Dates/times are US Eastern, venues per the official FIFA schedule. Group seeds (1A, 2B…) are projected from the live table and lock June 27; third-place slots resolve once the best-eight thirds are known.</div>`;
}

function render(){
  renderRibbon();
  const main=document.getElementById('main');
  const t=state.ui.tab;
  if(t==='matches') main.innerHTML=viewMatches();
  else if(t==='standings') main.innerHTML=viewStandings();
  else if(t==='news') main.innerHTML=viewNews();
  else if(t==='stats') main.innerHTML=viewStats();
  else if(t==='bracket') main.innerHTML=viewBracket();
  else main.innerHTML=viewRules();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  // scroll active day chip into view
  if(t==='matches'){ const on=document.querySelector('.dchip.on'); if(on) on.scrollIntoView({inline:'center',block:'nearest'}); }
}

/* ============================ EVENTS ============================ */
function clamp(v){ return Math.max(0,Math.min(20,v)); }
function setField(mid,who,fld,delta){
  if(who==='_res'){
    state.results[mid]=state.results[mid]||{};
    const cur=state.results[mid][fld];
    state.results[mid][fld]= cur==null?0:clamp(cur+delta);
  } else {
    state.predictions[mid]=state.predictions[mid]||{};
    state.predictions[mid][who]=state.predictions[mid][who]||{};
    const cur=state.predictions[mid][who][fld];
    state.predictions[mid][who][fld]= cur==null?0:clamp(cur+delta);
  }
  queueSave();
}

document.addEventListener('click',e=>{
  const tabBtn=e.target.closest('.tab');
  if(tabBtn){ state.ui.tab=tabBtn.dataset.tab; state.ui.editRes=null; render(); return; }

  const dayBtn=e.target.closest('.dchip');
  if(dayBtn){ state.ui.day=dayBtn.dataset.day; render(); return; }

  const pl=e.target.closest('.pchip[data-player]');
  if(pl){ state.ui.player=pl.dataset.player; queueSave();
    if(state.ui.tab==='bracket'){ document.getElementById('main').innerHTML=viewBracket(); }
    else { document.getElementById('main').innerHTML=viewMatches();
      const on=document.querySelector('.dchip.on'); if(on)on.scrollIntoView({inline:'center',block:'nearest'}); }
    return; }

  const arw=e.target.closest('.arw');
  if(arw){ setField(arw.dataset.mid,arw.dataset.who,arw.dataset.fld, arw.dataset.act==='inc'?1:-1);
    rerenderCard(arw.dataset.mid); refreshScores(); return; }

  const tr=e.target.closest('[data-act="toggleRes"]');
  if(tr){ state.ui.editRes = state.ui.editRes===tr.dataset.mid? null : tr.dataset.mid; rerenderCard(tr.dataset.mid);
    if(state.ui.editRes) document.getElementById('card-'+tr.dataset.mid).scrollIntoView({block:'center',behavior:'smooth'}); return; }

  const er=e.target.closest('[data-act="editRes"]');
  if(er){ if(state.results[er.dataset.mid]) state.results[er.dataset.mid].final=false;
    state.ui.editRes=er.dataset.mid; rerenderCard(er.dataset.mid); queueSave(); return; }

  const uw=e.target.closest('[data-act="updateWeb"]');
  if(uw){ updateFromWeb(); return; }

  const tp=e.target.closest('[data-act="togglePaste"]');
  if(tp){ state.ui.showPaste=!state.ui.showPaste; render(); return; }

  const ls=e.target.closest('[data-act="loadScores"]');
  if(ls){ const box=document.getElementById('scoreBox'); const msg=document.getElementById('scoreMsg');
    try{ const n=loadScoresCode((box.value||'').trim());
      if(!n){ if(msg){ msg.style.color='var(--live)'; msg.textContent='Nothing matched in that code.'; } return; }
      state.lastUpdated=Date.now(); queueSave(); render();
      const m2=document.getElementById('scoreMsg'); if(m2){ m2.style.color='var(--gold)'; m2.textContent=`Loaded ${n} update${n===1?'':'s'} ✓`; }
    }catch(err){ if(msg){ msg.style.color='var(--live)'; msg.textContent="That code didn't look right — copy the whole thing Claude gave you."; } }
    return; }

  const sv=e.target.closest('[data-act="saveRes"]');
  if(sv){ const mid=sv.dataset.mid; const r=state.results[mid]||{};
    if(r.ftH==null||r.ftA==null){ alert('Enter the full-time score first (use the ▲ ▼ on the top row).'); return; }
    r.final=true; r.source='manual'; r.detail='FT'; state.results[mid]=r; state.ui.editRes=null; doSave();
    sbSaveResult(mid).catch(()=>{});
    rerenderCard(mid); refreshScores();
    const c=document.getElementById('card-'+mid); if(c){c.classList.add('pop');}
    return; }

  const rs=e.target.closest('[data-act="reset"]');
  if(rs){ if(confirm('Reset every prediction, result and score for the whole family? This cannot be undone.')){
    state.predictions={}; state.results={}; state.koTeams={}; doSave(); render(); } return; }

  const spd=e.target.closest('[data-act="savePred"]');
  if(spd){ const mid=spd.dataset.mid; const who=state.ui.player; const stat=document.getElementById('ps-'+mid);
    if(!predComplete(pred(mid,who))){ if(stat){ stat.style.color='var(--live)'; stat.textContent='enter a score first'; } return; }
    doSave();
    if(stat){ stat.style.color='var(--mute)'; stat.textContent='saving…'; }
    sbSavePrediction(mid,who)
      .then(()=>{ const s=document.getElementById('ps-'+mid); if(s){ s.style.color='var(--gold)'; s.textContent='saved to Supabase ✓'; } })
      .catch(()=>{ const s=document.getElementById('ps-'+mid); if(s){ s.style.color='var(--live)'; s.textContent='saved on device · cloud needs the hosted site'; } });
    return; }

  const krt=e.target.closest('[data-act="bkRound"]');
  if(krt){ state.ui.bkRound=krt.dataset.round; document.getElementById('main').innerHTML=viewBracket(); return; }

  const bp=e.target.closest('[data-act="bkPick"]');
  if(bp){ const n=+bp.dataset.num, side=bp.dataset.side, w=state.ui.player;
    state.bracket[w]=state.bracket[w]||{};
    if(state.bracket[w][n]===side) delete state.bracket[w][n]; else state.bracket[w][n]=side;
    queueSave(); document.getElementById('main').innerHTML=viewBracket(); return; }

  const sbk=e.target.closest('[data-act="saveBracket"]');
  if(sbk){ const who=state.ui.player; const stat=document.getElementById('bk-stat');
    doSave();
    if(stat){ stat.style.color='var(--mute)'; stat.textContent='saving…'; }
    sbSaveBracket(who)
      .then(()=>{ const s=document.getElementById('bk-stat'); if(s){ s.style.color='var(--gold)'; s.textContent='bracket saved to Supabase ✓'; } })
      .catch(()=>{ const s=document.getElementById('bk-stat'); if(s){ s.style.color='var(--live)'; s.textContent='saved on device · cloud needs the hosted site'; } });
    return; }

  const svn=e.target.closest('[data-act="saveNow"]');
  if(svn){ saveNowAction(); return; }
  const rls=e.target.closest('[data-act="reloadSaved"]');
  if(rls){ reloadSavedAction(); return; }

  const eb=e.target.closest('[data-act="emailBackup"]');
  if(eb){ doSave(); emailBackup();
    const msg=document.getElementById('backupMsg');
    if(msg){ msg.style.color='var(--gold)'; msg.textContent='Opening your email app with the backup ready to send to '+BACKUP_EMAIL+' — just tap send.'; }
    return; }

  const shs=e.target.closest('[data-act="cloudSave"]');
  if(shs){ doSave(); syncSave(); return; }
  const shl=e.target.closest('[data-act="cloudLoad"]');
  if(shl){ syncLoad(); return; }
  const sha=e.target.closest('[data-act="cloudAuto"]');
  if(sha){ state.autoSheet=!!sha.checked; doSave();
    syncMsg(state.autoSheet?'Auto-save to the cloud is on (runs on your Vercel site).':'Auto-save to the cloud is off.', state.autoSheet); return; }
});

function applyOddsSeed(){ Object.keys(ODDS_SEED).forEach(id=>{ if(!state.odds[id]) state.odds[id]={...ODDS_SEED[id]}; }); }
function applyFamilySeed(){
  // Correct/seed the listed matches, but keep any newer picks/results the family added.
  Object.keys(PRED_SEED).forEach(mid=>{ state.predictions[mid]=Object.assign({}, state.predictions[mid]||{}, PRED_SEED[mid]); });
  Object.keys(RESULT_SEED).forEach(mid=>{ state.results[mid]={...RESULT_SEED[mid]}; });
  state.seedVersion=SEED_VERSION;
  applyOddsSeed();
}
(async function(){
  await loadState();
  if(state.seedVersion !== SEED_VERSION){ applyFamilySeed(); doSave(); }
  else { applyOddsSeed(); }
